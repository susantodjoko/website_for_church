{% extends 'base.html' %}
{% block title %}{{ liturgi.title }} — GKJ Salatiga{% endblock %}

{% block content %}
<div class="sermon-detail">
  <div class="container" style="max-width: 820px;">

    {% if liturgi.image %}
      <img src="{{ liturgi.image.url }}" alt="{{ liturgi.title }}"
           style="width: 100%; border-radius: 8px; margin-bottom: 2rem; object-fit: cover; max-height: 400px;">
    {% endif %}

    <p class="card__meta" style="margin-bottom: 0.5rem;">{{ liturgi.date }}</p>

    <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 1.5rem; line-height: 1.2;">
      {{ liturgi.title }}
    </h1>

    <div class="rich-content" style="line-height: 1.9; color: var(--color-text);">
      {{ liturgi.content|safe }}
    </div>

    <div style="margin-top: 2rem;">
      <a href="{% url 'website:liturgi' %}" class="btn btn--outline">&larr; Back to Liturgi</a>
    </div>

  </div>
</div>
{% endblock %}
